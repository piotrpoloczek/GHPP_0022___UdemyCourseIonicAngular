<ion-header>
  <ion-toolbar>
    <ion-title>{{ isLogin ? 'Login' : 'Sign Up' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content padding>
  <form #f="ngForm" (ngSubmit)="onSubmit(f)">
    <ion-grid>
      <ion-row>
        <ion-col size-md="6" offset-md="3">
          <ion-item>
            <ion-label position="floating">Email</ion-label>
            <ion-input 
              type="email"
              ngModel
              name="email"
              required
              #emailCtrl="ngModel"
            ></ion-input>
            <ion-item *ngIf="!emailCtrl.valid && emailCtrl.touched" lines="none">
              <label>
                Should be a valid adress email
              </label>
            </ion-item>
          </ion-item>
          <ion-item>
            <ion-label position="floating">Password</ion-label>
            <ion-input 
              type="password"
              ngModel 
              name="password"
              required
              minLength="6"
              #passwordCtrl="ngModel"
            ></ion-input>
            <ion-item 
              *ngIf="!passwordCtrl.valid && passwordCtrl.touched" 
              lines="none"
            ><label>
                Should be a valid password
              </label>
            </ion-item>
          </ion-item>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size-md="6" offset-md="3">
          <ion-button 
            type="button" 
            color="primary" 
            fill="clear" 
            expand="block"
            (click)="onSwitchAuthMode()"
            >Switch to {{ isLogin ? 'Signup' : 'Login' }}</ion-button>
          <ion-button 
            type="submit"
            color="primary" 
            (click)="onLogin()" 
            expand="block"
            [disabled]="!f.valid"
            >{{ isLogin ? 'Login' : 'Signup' }}</ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </form>

</ion-content>
