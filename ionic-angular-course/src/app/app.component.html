<ion-app>
  <ion-menu
    side="start"
    menuId="m1"
    contentId="main-content"
    type="overlay"
    class="fullscreen-menu"
  >
    <ion-header>
      <ion-toolbar>
        <ion-title>PairBnB</ion-title>

        <ion-buttons slot="end">
          <ion-menu-toggle>
            <ion-button>
              <ion-icon slot="icon-only" name="close-outline"></ion-icon>
            </ion-button>
          </ion-menu-toggle>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-list>
        <ion-item
          button
          lines="none"
          detail="false"
          (click)="openControlPanel()"
        >
          <ion-icon name="options-outline" slot="start"></ion-icon>
          <ion-label>Device Controls</ion-label>
        </ion-item>

        <ion-menu-toggle autoHide="false">
          <ion-item
            lines="none"
            routerLink="/places/tabs/discover"
            routerDirection="root"
          >
            <ion-icon name="business" slot="start"></ion-icon>
            <ion-label>Discover Places</ion-label>
          </ion-item>
        </ion-menu-toggle>

        <ion-menu-toggle autoHide="false">
          <ion-item
            lines="none"
            routerLink="/bookings"
            routerDirection="root"
          >
            <ion-icon name="checkbox-outline" slot="start"></ion-icon>
            <ion-label>Your Bookings</ion-label>
          </ion-item>
        </ion-menu-toggle>

        <ion-menu-toggle autoHide="false">
          <ion-item lines="none" button (click)="onLogout()">
            <ion-icon name="exit-outline" slot="start"></ion-icon>
            <ion-label>Log Out</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
